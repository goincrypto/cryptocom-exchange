openapi: 3.0.3
info:
  title: private/user-balance-history
  version: 1.0.0
servers:
  - url: https://api.crypto.com/exchange/v1
    description: Production
  - url: https://uat-api.3ona.co/exchange/v1
    description: UAT Sandbox
paths:
  /private/user-balance-history:
    post:
      tags:
        - Account Balance and Positions
      x-apply-to:
        - rest
      summary: private/user-balance-history
      description: Returns the user's balance history. This call may temporarily have discrepancies with that shown on the GUI.
      operationId: privateUserBalanceHistory
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            const ccxt = require('ccxt');
            const exchange = new ccxt.cryptocom({
              apiKey: 'YOUR_API_KEY',
              secret: 'YOUR_SECRET',
              enableRateLimit: true,
            });
            const res = await exchange.v1PrivatePostPrivateUserBalanceHistory({});
            console.log(res);
        - lang: Python
          label: Python
          source: |
            import ccxt
            exchange = ccxt.cryptocom({
                'apiKey': 'YOUR_API_KEY',
                'secret': 'YOUR_SECRET',
                'enableRateLimit': True,
            })
            res = exchange.v1_private_post_private_user_balance_history({})
            print(res)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivateUserBalanceHistoryRequest"
            example:
              id: "11"
              method: private/user-balance-history
              api_key: YOUR_API_KEY
              sig: DIGITAL_SIGNATURE
              params: {}
              nonce: "1611022832613"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserBalanceHistoryResponse"
              example:
                id: "11"
                method: private/user-balance-history
                code: "0"
                result:
                  instrument_name: USD
                  data:
                    - t: "1629478800000"
                      c: "811.621851"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserBalanceHistoryResponse"
              example:
                id: "1"
                method: private/user-balance-history
                code: "40001"
                message: BAD_REQUEST
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserBalanceHistoryResponse"
              example:
                id: "1"
                method: private/user-balance-history
                code: "40101"
                message: UNAUTHORIZED
        "408":
          description: Request timeout.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserBalanceHistoryResponse"
              example:
                id: "1"
                method: private/user-balance-history
                code: "40801"
                message: REQUEST_TIMEOUT
        "429":
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserBalanceHistoryResponse"
              example:
                id: "1"
                method: private/user-balance-history
                code: "42901"
                message: TOO_MANY_REQUESTS
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserBalanceHistoryResponse"
              example:
                id: "1"
                method: private/user-balance-history
                code: "50001"
                message: INTERNAL_SERVER_ERROR
components:
  schemas:
    PrivateUserBalanceHistoryRequest:
      type: object
      x-archetype: Request
      required:
        - id
        - method
        - api_key
        - sig
        - nonce
        - params
      description: Request body for private/user-balance-history. Returns balance history; may temporarily differ from GUI.
      properties:
        id:
          type: string
          format: int64
          description: Request id (echoed in response)
        method:
          type: string
          description: Must be "private/user-balance-history"
          example: private/user-balance-history
        api_key:
          type: string
          description: Your API key (only required for private REST)
        sig:
          type: string
          description: HMAC-SHA256 signature in hex (only required for private REST)
        nonce:
          type: string
          format: int64
          description: Current timestamp in milliseconds, e.g. "1771761038000".
        params:
          type: object
          properties:
            timeframe:
              allOf:
                - $ref: "#/components/schemas/Timeframe"
                - example: D1
                  description: H1 means every hour, D1 means every day. Omit for D1.
            end_time:
              type: string
              format: int64
              description: Can be millisecond or nanosecond. Exclusive, e.g. "1771761038000" or "1771761038000000000". If not provided, will be current time.
            limit:
              type: string
              format: int32
              description: If timeframe is D1, max limit will be 30 (days). If timeframe is H1, max limit will be 120 (hours).
    Timeframe:
      type: string
      enum:
        - H1
        - D1
      description: H1 = hourly, D1 = daily
    PrivateUserBalanceHistoryResponse:
      type: object
      description: |
        Response for private/user-balance-history (HTTP 200/4xx/5xx).
        code === 0 → success, result present.
        code !== 0 → error, message and/or original present.
      properties:
        id:
          type: string
          format: int64
          description: Echoed request id
        method:
          type: string
          description: Method invoked
        code:
          type: string
          format: int32
          description: 0 = success; non-zero indicates error (reason code).
        result:
          type: object
          description: Present when code === 0. instrument_name, data[] with t (timestamp), c (total cash balance); optional i.
          properties:
            instrument_name:
              type: string
              description: Instrument name of the balance e.g. USD
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserBalanceHistoryItem"
        message:
          type: string
          description: Present when code !== 0.
        original:
          type: string
          description: Present when code !== 0.
    UserBalanceHistoryItem:
      type: object
      description: Single balance-history point for private/user-balance-history result.data[].
      properties:
        t:
          type: string
          format: int64
          description: Timestamp (ms).
        c:
          type: string
          format: decimal
          description: Total cash balance.
