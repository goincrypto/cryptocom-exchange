                  instrument_name: BTCUSD-PERP
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicGetBookResponse"
              example:
                id: "1"
                method: public/get-book
                code: "40001"
                message: BAD_REQUEST
        "408":
          description: Request timeout.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicGetBookResponse"
              example:
                id: "1"
                method: public/get-book
                code: "40801"
                message: REQUEST_TIMEOUT
        "429":
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicGetBookResponse"
              example:
                id: "1"
                method: public/get-book
                code: "42901"
                message: TOO_MANY_REQUESTS
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicGetBookResponse"
              example:
                id: "1"
                method: public/get-book
                code: "50001"
                message: INTERNAL_SERVER_ERROR
components:
  schemas:
    PublicGetBookResponse:
      type: object
      description: |
        Response for public/get-book (HTTP 200/4xx/5xx).
        code === 0 → success, result present.
        code !== 0 → error, message and/or original present.
      properties:
        id:
          type: string
          format: int64
          description: Echoed request id
        method:
          type: string
          description: Method invoked
        code:
          type: string
          format: int32
          description: 0 = success; non-zero indicates error (reason code).
        result:
          type: object
          description: Present when code === 0. Order book. data is array of one object; bids/asks are [Price, Quantity, NumOrders].
          properties:
            depth:
              type: string
              format: int32
              description: Number of bids and asks to return (up to 50)
            instrument_name:
              type: string
              description: e.g. BTCUSD-PERP
            data:
              type: array
              items:
                type: object
                properties:
                  bids:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookSnapshotLevel"
                  asks:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookSnapshotLevel"
        message:
          type: string
          description: Present when code !== 0.
        original:
          type: string
          description: Present when code !== 0.
    BookSnapshotLevel:
      type: array
      items:
        type: string
        format: decimal
      description: "[0] = Price, [1] = Quantity, [2] = Number of Orders. Known issue: Number of Orders currently returns 0."
