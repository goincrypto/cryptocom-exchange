              schema:
                $ref: "#/components/schemas/PublicGetBookResponse"
              example:
                code: "0"
                method: public/get-book
                result:
                  depth: "10"
                  data:
                    - asks:
                        - - "50126.000000"
                          - "0.400000"
                          - "0"
                        - - "50130.000000"
                          - "1.279000"
                          - "0"
                        - - "50136.000000"
                          - "1.279000"
                          - "0"
                        - - "50137.000000"
                          - "0.800000"
