                          - "1.279000"
                          - "0"
                        - - "50160.000000"
                          - "1.133000"
                          - "0"
                        - - "50166.000000"
                          - "3.090700"
                          - "0"
                        - - "50172.000000"
                          - "1.279000"
                          - "0"
                      bids:
                        - - "50113.500000"
                          - "0.400000"
