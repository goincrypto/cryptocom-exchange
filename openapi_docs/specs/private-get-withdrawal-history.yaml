openapi: 3.0.3
info:
  title: private/get-withdrawal-history
  version: 1.0.0
servers:
  - url: https://api.crypto.com/exchange/v1
    description: Production
  - url: https://uat-api.3ona.co/exchange/v1
    description: UAT Sandbox
paths:
  /private/get-withdrawal-history:
    post:
      tags:
        - Crypto Wallet
      x-apply-to:
        - rest
      summary: private/get-withdrawal-history
      description: Fetches withdrawal history. If you do not see the option when viewing your API Keys, this feature is not yet available for you.
      operationId: privateGetWithdrawalHistory
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            const ccxt = require('ccxt');
            const exchange = new ccxt.cryptocom({
              apiKey: 'YOUR_API_KEY',
              secret: 'YOUR_SECRET',
              enableRateLimit: true,
            });
            const res = await exchange.v1PrivatePostPrivateGetWithdrawalHistory({
              currency: 'XRP',
              start_ts: "1587846300000",
              end_ts: "1587846358253",
              page_size: "2",
              page: "0",
              status: '1',
            });
            console.log(res);
        - lang: Python
          label: Python
          source: |
            import ccxt
            exchange = ccxt.cryptocom({
                'apiKey': 'YOUR_API_KEY',
                'secret': 'YOUR_SECRET',
                'enableRateLimit': True,
            })
            res = exchange.v1_private_post_private_get_withdrawal_history({
                'currency': 'XRP',
                'start_ts': "1587846300000",
                'end_ts': "1587846358253",
                'page_size': "2",
                'page': "0",
                'status': '1',
            })
            print(res)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivateGetWithdrawalHistoryRequest"
            example:
              id: "-1"
              method: private/get-withdrawal-history
              api_key: YOUR_API_KEY
              sig: DIGITAL_SIGNATURE
              nonce: "1587846358253"
              params:
                currency: XRP
                start_ts: "1587846300000"
                end_ts: "1587846358253"
                page_size: "2"
                page: "0"
                status: "1"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateGetWithdrawalHistoryResponse"
              example:
                id: "11"
                method: private/get-withdrawal-history
                code: "0"
                result:
                  withdrawal_list:
                    - currency: XRP
                      client_wid: my_withdrawal_002
                      fee: "1.0"
                      create_time: "1607063412000"
                      id: "2220"
                      update_time: "1607063460000"
                      amount: "100"
                      address: 2NBqqD5GRJ8wHy1PYyCXTe9ke5226FhavBf?1234567890
                      status: "1"
                      txid: ""
                      network_id: null
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateGetWithdrawalHistoryResponse"
              example:
                id: "1"
                method: private/get-withdrawal-history
                code: "40001"
                message: BAD_REQUEST
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateGetWithdrawalHistoryResponse"
              example:
                id: "1"
                method: private/get-withdrawal-history
                code: "40101"
                message: UNAUTHORIZED
        "408":
          description: Request timeout.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateGetWithdrawalHistoryResponse"
              example:
                id: "1"
                method: private/get-withdrawal-history
                code: "40801"
                message: REQUEST_TIMEOUT
        "429":
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateGetWithdrawalHistoryResponse"
              example:
                id: "1"
                method: private/get-withdrawal-history
                code: "42901"
                message: TOO_MANY_REQUESTS
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateGetWithdrawalHistoryResponse"
              example:
                id: "1"
                method: private/get-withdrawal-history
                code: "50001"
                message: INTERNAL_SERVER_ERROR
components:
  schemas:
    PrivateGetWithdrawalHistoryRequest:
      type: object
      x-archetype: Request
      required:
        - id
        - method
        - api_key
        - sig
        - nonce
        - params
      description: Request body for private/get-withdrawal-history.
      properties:
        id:
          type: string
          format: int64
          description: Request id (echoed in response)
        method:
          type: string
          description: Must be "private/get-withdrawal-history"
          example: private/get-withdrawal-history
        api_key:
          type: string
          description: Your API key (only required for private REST)
        sig:
          type: string
          description: HMAC-SHA256 signature in hex (only required for private REST)
        nonce:
          type: string
          format: int64
          description: Current timestamp in milliseconds, e.g. "1771761038000".
        params:
          type: object
          properties:
            currency:
              type: string
              description: E.g. BTC, CRO.
            start_ts:
              type: string
              format: int64
              description: Start time (ms). Default is 90 days before current timestamp.
            end_ts:
              type: string
              format: int64
              description: End time (ms). Default is current timestamp.
            page_size:
              type: string
              format: int32
              description: "Page size (Default: 20, Max: 200)."
            page:
              type: string
              format: int32
              description: Page number (0-based).
            status:
              $ref: "#/components/schemas/WithdrawalStatus"
    WithdrawalStatus:
      type: string
      enum:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "6"
      description: |
        Withdrawal status. Used in private/get-withdrawal-history request (filter) and response (withdrawal_list[].status).
        - ➖ 0: Pending
        - ➖ 1: Processing
        - ➖ 2: Rejected
        - ➖ 3: Payment In-progress
        - ➖ 4: Payment Failed
        - ➖ 5: Completed
        - ➖ 6: Cancelled
    PrivateGetWithdrawalHistoryResponse:
      type: object
      description: |
        Response for private/get-withdrawal-history (HTTP 200/4xx/5xx).
        code === 0 → success, result present.
        code !== 0 → error, message and/or original present.
      properties:
        id:
          type: string
          format: int64
          description: Echoed request id
        method:
          type: string
          description: Method invoked
        code:
          type: string
          format: int32
          description: 0 = success; non-zero indicates error (reason code).
        result:
          type: object
          description: Present when code === 0. withdrawal_list (currency, client_wid, fee, create_time, id, update_time, amount, address, status, txid, network_id).
          properties:
            withdrawal_list:
              type: array
              description: List of withdrawal records.
              items:
                type: object
                properties:
                  currency:
                    type: string
                    description: E.g. BTC, CRO.
                  client_wid:
                    type: string
                    description: Client withdrawal ID from the request, if provided.
                  fee:
                    type: string
                    format: decimal
                    description: Withdrawal fee.
                  create_time:
                    type: string
                    format: int64
                    description: Creation timestamp.
                  id:
                    type: string
                    description: Withdrawal ID.
                  update_time:
                    type: string
                    format: int64
                    description: Last update timestamp.
                  amount:
                    type: string
                    format: decimal
                    description: Withdrawal amount.
                  address:
                    type: string
                    description: Address with Address Tag (if any).
                  status:
                    $ref: "#/components/schemas/WithdrawalStatus"
                  txid:
                    type: string
                    description: Transaction hash.
                  network_id:
                    type: string
                    description: Network for the transaction; only available when the exchange supports multiple networks for the currency.
        message:
          type: string
          description: Present when code !== 0.
        original:
          type: string
          description: Present when code !== 0.
