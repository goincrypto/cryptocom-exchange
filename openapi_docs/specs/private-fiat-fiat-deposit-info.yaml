openapi: 3.0.3
info:
  title: private/fiat/fiat-deposit-info
  version: 1.0.0
servers:
  - url: https://api.crypto.com/exchange/v1
    description: Production
  - url: https://uat-api.3ona.co/exchange/v1
    description: UAT Sandbox
paths:
  /private/fiat/fiat-deposit-info:
    post:
      tags:
        - Fiat Wallet
      x-apply-to:
        - rest
      summary: private/fiat/fiat-deposit-info
      description: Retrieves fiat deposit information for the authenticated user. Returns bank details for depositing fiat currency with optional payment network filtering.
      operationId: privateFiatFiatDepositInfo
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            const ccxt = require('ccxt');
            const exchange = new ccxt.cryptocom({
              apiKey: 'YOUR_API_KEY',
              secret: 'YOUR_SECRET',
              enableRateLimit: true,
            });
            const res = await exchange.v1PrivatePostPrivateFiatFiatDepositInfo({
              payment_networks: 'usd_cubix',
            });
            console.log(res);
        - lang: Python
          label: Python
          source: |
            import ccxt
            exchange = ccxt.cryptocom({
                'apiKey': 'YOUR_API_KEY',
                'secret': 'YOUR_SECRET',
                'enableRateLimit': True,
            })
            res = exchange.v1_private_post_private_fiat_fiat_deposit_info({
                'payment_networks': 'usd_cubix',
            })
            print(res)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivateFiatFiatDepositInfoRequest"
            example:
              id: "123456"
              method: private/fiat/fiat-deposit-info
              api_key: YOUR_API_KEY
              sig: DIGITAL_SIGNATURE
              nonce: "1640995200000"
              params:
                payment_networks: usd_cubix
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateFiatFiatDepositInfoResponse"
              examples:
                Example - usd_cubix:
                  value:
                    id: "123456"
                    method: private/fiat/fiat-deposit-info
                    code: "0"
                    result:
                      deposit_info_list:
                        - payment_network: usd_cubix
                          currency: USD
                          bank_details:
                            account_holder_name: null
                            bank_name: null
                            bank_address: null
                            bank_country: null
                            routing_number: null
                            account_number: null
                            recipient_name: null
                            recipient_address: null
                            bic_code: null
                            iban_code: null
                            reference_code: null
                            sort_code: null
                            cubix_partner_name: Crypto.com
                            cubix_account_name: Foris Dax Inc
                            cubix_account_id: 48e8431d-2026-41d4-a872-b1ed00db8626
                            cubix_account_number: "5859"
                            account_type: null
                            meta: null
                Example - usd_swift:
                  value:
                    id: "0"
                    method: private/fiat/fiat-deposit-info
                    code: "0"
                    result:
                      deposit_info_list:
                        - payment_network: usd_swift
                          currency: USD
                          bank_details:
                            account_holder_name: null
                            bank_name: Customers Bank
                            bank_address: 701 Reading Avenue, West Reading, Pennsylvania 19611
                            bank_country: null
                            routing_number: "031302971"
                            account_number: "5415859"
                            recipient_name: FORIS DAX LIMITED
                            recipient_address: P.O. BOX 31910, 20 GENESIS CLOSE GRAND CAYMAN
                            bic_code: CUESUS33
                            iban_code: null
                            reference_code: "676938157158298"
                            sort_code: null
                            cubix_partner_name: null
                            cubix_account_name: null
                            cubix_account_id: null
                            cubix_account_number: null
                            meta: null
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateFiatFiatDepositInfoResponse"
              example:
                id: "1"
                method: private/fiat/fiat-deposit-info
                code: "40001"
                message: BAD_REQUEST
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateFiatFiatDepositInfoResponse"
              example:
                id: "1"
                method: private/fiat/fiat-deposit-info
                code: "40101"
                message: UNAUTHORIZED
        "408":
          description: Request timeout.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateFiatFiatDepositInfoResponse"
              example:
                id: "1"
                method: private/fiat/fiat-deposit-info
                code: "40801"
                message: REQUEST_TIMEOUT
        "429":
          description: Too many requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateFiatFiatDepositInfoResponse"
              example:
                id: "1"
                method: private/fiat/fiat-deposit-info
                code: "42901"
                message: TOO_MANY_REQUESTS
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateFiatFiatDepositInfoResponse"
              example:
                id: "1"
                method: private/fiat/fiat-deposit-info
                code: "50001"
                message: INTERNAL_SERVER_ERROR
components:
  schemas:
    PrivateFiatFiatDepositInfoRequest:
      type: object
      x-archetype: Request
      required:
        - id
        - method
        - api_key
        - sig
        - nonce
        - params
      description: Request body for private/fiat/fiat-deposit-info.
      properties:
        id:
          type: string
          format: int64
          description: Request id (echoed in response)
        method:
          type: string
          description: Must be "private/fiat/fiat-deposit-info"
          example: private/fiat/fiat-deposit-info
        api_key:
          type: string
          description: Your API key (only required for private REST)
        sig:
          type: string
          description: HMAC-SHA256 signature in hex (only required for private REST)
        nonce:
          type: string
          format: int64
          description: Current timestamp in milliseconds, e.g. "1771761038000".
        params:
          type: object
          properties:
            payment_networks:
              type: string
              description: Comma-separated list of payment networks to filter by
    PrivateFiatFiatDepositInfoResponse:
      type: object
      description: |
        Response for private/fiat/fiat-deposit-info (HTTP 200/4xx/5xx).
        code === 0 → success, result present.
        code !== 0 → error, message and/or original present.
      properties:
        id:
          type: string
          format: int64
          description: Echoed request id
        method:
          type: string
          description: Method invoked
        code:
          type: string
          format: int32
          description: 0 = success; non-zero indicates error (reason code).
        result:
          type: object
          description: Present when code === 0. deposit_info_list per docs.
          required:
            - deposit_info_list
          properties:
            deposit_info_list:
              type: array
              description: List of deposit information
              items:
                type: object
                required:
                  - payment_network
                  - currency
                  - bank_details
                properties:
                  payment_network:
                    type: string
                    description: Payment network identifier
                  currency:
                    type: string
                    description: Currency code
                  bank_details:
                    type: object
                    description: Bank details object
                    properties:
                      account_holder_name:
                        type: string
                        nullable: true
                        description: Account holder name
                      bank_name:
                        type: string
                        nullable: true
                        description: Bank name
                      bank_address:
                        type: string
                        nullable: true
                        description: Bank address
                      bank_country:
                        type: string
                        nullable: true
                        description: Bank country
                      routing_number:
                        type: string
                        nullable: true
                        description: Bank routing number
                      account_number:
                        type: string
                        nullable: true
                        description: Bank account number
                      recipient_name:
                        type: string
                        nullable: true
                        description: Recipient name
                      recipient_address:
                        type: string
                        nullable: true
                        description: Recipient address
                      bic_code:
                        type: string
                        nullable: true
                        description: Bank Identifier Code (SWIFT code)
                      iban_code:
                        type: string
                        nullable: true
                        description: International Bank Account Number
                      reference_code:
                        type: string
                        nullable: true
                        description: Reference code for the deposit
                      sort_code:
                        type: string
                        nullable: true
                        description: UK bank sort code
                      cubix_partner_name:
                        type: string
                        nullable: true
                        description: Cubix partner name
                      cubix_account_name:
                        type: string
                        nullable: true
                        description: Cubix account name
                      cubix_account_id:
                        type: string
                        nullable: true
                        description: Cubix account ID
                      cubix_account_number:
                        type: string
                        nullable: true
                        description: Last 4 digits of Cubix account number
                      account_type:
                        type: string
                        nullable: true
                        description: Account type
                      meta:
                        type: object
                        nullable: true
                        description: Additional metadata
        message:
          type: string
          description: Present when code !== 0.
        original:
          type: string
          description: Present when code !== 0.
